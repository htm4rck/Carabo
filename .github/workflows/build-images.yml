name: Build Images

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: carabo
            context: source/apps/api
            dockerfile: source/apps/api/Dockerfile
          - image: carabo-ui
            context: source/apps/ui
            dockerfile: source/apps/ui/Dockerfile

    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build secrets
        run: |
          mkdir -p .docker-secrets
          printf "%s" "${NPMRC:-}" > .docker-secrets/npmrc
        env:
          NPMRC: ${{ secrets.NPMRC }}

      - name: Resolve tags
        id: meta
        shell: bash
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/$owner/${{ matrix.image }}"
          ref="${GITHUB_REF_NAME//\//-}"
          {
            echo "tags<<EOF"
            echo "$image:$ref"
            echo "$image:${{ github.sha }}"
            if [[ "${{ github.ref_type }}" == "branch" && "$ref" == "main" ]]; then
              echo "$image:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          secret-files: |
            npmrc=.docker-secrets/npmrc
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
